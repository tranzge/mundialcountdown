<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Maestro Mundial 2026 | Sedes y Fechas ⚽</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KMZ4VQXY2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6KMZ4VQXY2');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --stadium-green: #00df82; 
            --pitch-dark: #01160d; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--pitch-dark); color: white; font-family: 'Inter', sans-serif; margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.15), transparent);
            background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Barlow Condensed'; font-size: 4rem; margin: 0; color: var(--stadium-green); text-transform: uppercase; }

        /* FILTROS */
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s;
            font-size: 0.9rem;
        }
        .filter-btn.active { background: var(--neon-blue); color: black; border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }

        /* CALENDARIO */
        .match-grid { display: grid; gap: 15px; }
        .match-card { 
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 25px;
            transition: 0.3s;
        }
        .match-card:hover { transform: translateY(-5px); border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }

        .date-badge { text-align: center; min-width: 80px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px; }
        .day { display: block; font-size: 2.5rem; font-family: 'Barlow Condensed'; font-weight: 900; color: var(--stadium-green); line-height: 1; }
        .month { font-size: 0.9rem; font-weight: 700; opacity: 0.6; }

        .details { flex-grow: 1; }
        .details h3 { margin: 0; font-size: 1.3rem; font-family: 'Barlow Condensed'; letter-spacing: 1px; color: #fff; }
        .venue { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--neon-blue); margin-top: 8px; font-weight: 600; }
        
        .country-pill { 
            font-size: 0.7rem; font-weight: 900; padding: 4px 12px; border-radius: 5px; 
            text-transform: uppercase; margin-top: 10px; display: inline-block;
        }
        .mx { background: #006847; color: white; }
        .us { background: #002868; color: white; }
        .ca { background: #FF0000; color: white; }

        .btn-back { display: block; text-align: center; margin-top: 50px; color: var(--stadium-green); text-decoration: none; font-weight: 900; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .match-card { animation: fadeInUp 0.5s ease forwards; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CALENDARIO 2026</h1>
        <p style="opacity:0.6; letter-spacing:3px;">THE MYTH & THE MACHINE EDITION</p>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('all', this)">TODOS LOS PARTIDOS</button>
        <button class="filter-btn" onclick="filter('mexico', this)">MÉXICO 🇲🇽</button>
        <button class="filter-btn" onclick="filter('usa', this)">USA 🇺🇸</button>
        <button class="filter-btn" onclick="filter('canada', this)">CANADÁ 🇨🇦</button>
    </div>

    <div class="match-grid" id="match-list">
        </div>

    <a href="index.html" class="btn-back">← REGRESAR AL CONTEO</a>
</div>

<script>
    const matches = [
        { d: "11", m: "JUN", t: "INICIAL: MÉXICO VS TBD", v: "Estadio Azteca, CDMX", c: "mexico", cl: "mx" },
        { d: "12", m: "JUN", t: "CANADÁ VS TBD", v: "BMO Field, Toronto", c: "canada", cl: "ca" },
        { d: "12", m: "JUN", t: "USA VS TBD", v: "SoFi Stadium, Los Ángeles", c: "usa", cl: "us" },
        { d: "14", m: "JUN", t: "FASE DE GRUPOS", v: "Estadio BBVA, Monterrey", c: "mexico", cl: "mx" },
        { d: "15", m: "JUN", t: "FASE DE GRUPOS", v: "Estadio Akron, Guadalajara", c: "mexico", cl: "mx" },
        { d: "16", m: "JUN", t: "FASE DE GRUPOS", v: "Lumen Field, Seattle", c: "usa", cl: "us" },
        { d: "17", m: "JUN", t: "FASE DE GRUPOS", v: "MetLife Stadium, NY/NJ", c: "usa", cl: "us" },
        { d: "24", m: "JUN", t: "ÚLTIMO GRUPO MÉXICO", v: "Estadio Azteca, CDMX", c: "mexico", cl: "mx" },
        { d: "28", m: "JUN", t: "RONDA DE 32", v: "Hard Rock Stadium, Miami", c: "usa", cl: "us" },
        { d: "04", m: "JUL", t: "CUARTOS DE FINAL", v: "Gillette Stadium, Boston", c: "usa", cl: "us" },
        { d: "14", m: "JUL", t: "SEMIFINAL A", v: "AT&T Stadium, Dallas", c: "usa", cl: "us" },
        { d: "15", m: "JUL", t: "SEMIFINAL B", v: "Mercedes-Benz, Atlanta", c: "usa", cl: "us" },
        { d: "19", m: "JUL", t: "GRAN FINAL MUNDIAL", v: "MetLife Stadium, New Jersey", c: "usa", cl: "us" }
    ];

    function renderMatches(filterVal) {
        const list = document.getElementById('match-list');
        list.innerHTML = "";
        
        matches.forEach(m => {
            if(filterVal === 'all' || m.c === filterVal) {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="date-badge">
                        <span class="day">${m.d}</span>
                        <span class="month">${m.m}</span>
                    </div>
                    <div class="details">
                        <h3>${m.t}</h3>
                        <div class="venue">📍 ${m.v}</div>
                        <span class="country-pill ${m.cl}">${m.c}</span>
                    </div>
                `;
                list.appendChild(card);
            }
        });
    }

    function filter(c, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMatches(c);
    }

    // Inicializar
    renderMatches('all');
</script>
</body>
</html>
