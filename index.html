<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 | Centro de Pasión</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-6KMZ4VQXY2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date()); gtag('config', 'G-6KMZ4VQXY2');
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --neon-green: #39FF14; }
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #FFFFFF; overflow-x: hidden; }
        h1, h2, h3, h4, .font-oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .font-tactical { font-family: 'Chakra Petch', sans-serif; }
        
        .neon-glow { text-shadow: 0 0 25px rgba(57, 255, 20, 0.7); }
        .stadium-bg { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.2), rgba(0,0,0,1)), 
                        url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=2000'); 
            background-size: cover; background-position: center; 
        }
        
        .led-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.3);
        }

        .fact-display {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .podcast-card {
            background: rgba(255, 255, 255, 0.03);
            border-top: 4px solid var(--neon-green);
            transition: all 0.3s ease;
        }
        .podcast-card:hover { background: rgba(57, 255, 20, 0.05); transform: translateY(-5px); }

        /* Estilo para los reproductores de audio en navegadores webkit */
        audio::-webkit-media-controls-panel { background-color: var(--neon-green); }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display,
        audio::-webkit-media-controls-timeline,
        audio::-webkit-media-controls-volume-slider,
        audio::-webkit-media-controls-mute-button {
            filter: invert(1);
        }

        .btn-neon {
            background-color: var(--neon-green);
            color: black;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.1em;
        }
        .btn-neon:hover { background-color: white; transform: scale(1.05); }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [timeLeft, setTimeLeft] = useState({ dias: 0, horas: 0, min: 0, seg: 0 });
            const [currentFact, setCurrentFact] = useState(0);

            const datosCuriosos = [
                "En 1930, el árbitro John Langenus exigió un seguro de vida y un barco listo para escapar.",
                "Héctor Castro 'El Manco Divino' anotó en la final de 1930 a pesar de faltarle un antebrazo.",
                "Ottorino Barassi ocultó el trofeo Jules Rimet en una caja de zapatos bajo su cama para salvarlo de los nazis.",
                "México usó uniformes color guinda en 1930, no verde.",
                "El balón de 2026 tendrá sensores 5G con latencia menor a 1ms.",
                "India renunció al Mundial de 1950 porque no les permitieron jugar descalzos.",
                "El estadio de Seattle es el más ruidoso del mundo (137.6 decibelios).",
                "Mussolini eligió personalmente a los árbitros de Italia 1934.",
                "Uruguay se coronó en 1950 silenciando a 200,000 personas en el Maracanazo."
            ];

            const podcasts = [
                { id: 1, title: "La Odisea del 30", desc: "El origen del torneo y el viaje del Conte Verde hacia Uruguay.", file: "pasion_01.mp3" },
                { id: 2, title: "Evolución Táctica", desc: "De balones de cuero a sensores IMU 5G de alta precisión.", file: "pasion_02.mp3" },
                { id: 3, title: "Fútbol y Guerra", desc: "La historia de la Copa Jules Rimet oculta bajo una cama.", file: "pasion_03.mp3" },
                { id: 4, title: "México 2026", desc: "Las 16 sedes y el impacto del Gigante de Norteamérica.", file: "pasion_04.mp3" },
                { id: 5, title: "Economía de la Fe", desc: "El impacto de los 11 billones de dólares proyectados por FIFA.", file: "pasion_05.mp3" }
            ];

            useEffect(() => {
                const target = new Date('2026-06-11T00:00:00').getTime();
                const timer = setInterval(() => {
                    const diff = target - new Date().getTime();
                    setTimeLeft({
                        dias: Math.floor(diff / (1000 * 60 * 60 * 24)),
                        horas: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        min: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                        seg: Math.floor((diff % (1000 * 60)) / 1000),
                    });
                }, 1000);

                const factTimer = setInterval(() => {
                    setCurrentFact(prev => (prev + 1) % datosCuriosos.length);
                }, 8000);

                return () => { clearInterval(timer); clearInterval(factTimer); };
            }, []);

            return (
                <div className="min-h-screen">
                    {/* HERO & COUNTDOWN */}
                    <header className="stadium-bg min-h-screen flex flex-col items-center pt-8 px-4">
                        <nav className="w-full max-w-6xl flex justify-between items-center z-30 mb-8 px-4">
                            <div className="flex items-center gap-2">
                                <i data-lucide="trophy" className="text-[#39FF14] w-6 h-6"></i>
                                <span className="font-oswald text-xl md:text-2xl tracking-tighter">MUNDIAL<span className="text-[#39FF14]">2026</span></span>
                            </div>
                            <div className="bg-[#39FF14] text-black px-4 py-1 font-tactical text-xs rounded-full font-bold uppercase tracking-widest border-2 border-black">Live: Sede México</div>
                        </nav>

                        <div className="relative z-20 w-full max-w-5xl text-center">
                            <h1 className="text-4xl md:text-8xl font-oswald mb-6 drop-shadow-2xl italic">EL PITAZO INICIAL EN:</h1>
                            
                            <div className="led-panel p-6 md:p-12 rounded-3xl mx-auto w-full max-w-3xl mb-12">
                                <div className="flex flex-col items-center">
                                    <span className="font-tactical text-[7rem] md:text-[16rem] leading-none text-[#39FF14] neon-glow">
                                        {timeLeft.dias}
                                    </span>
                                    <div className="bg-[#39FF14] text-black font-oswald px-10 py-1 text-sm md:text-3xl tracking-[0.4em] font-bold -mt-2 md:-mt-12 mb-8 skew-x-[-12deg]">
                                        DÍAS
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-4 md:gap-16 w-full border-t border-white/20 pt-8">
                                        <div className="flex flex-col items-center">
                                            <span className="font-tactical text-3xl md:text-7xl text-white">{String(timeLeft.horas).padStart(2,'0')}</span>
                                            <span className="text-[10px] md:text-xs text-[#39FF14] font-bold tracking-widest uppercase">Horas</span>
                                        </div>
                                        <div className="flex flex-col items-center border-x border-white/10 px-4">
                                            <span className="font-tactical text-3xl md:text-7xl text-white">{String(timeLeft.min).padStart(2,'0')}</span>
                                            <span className="text-[10px] md:text-xs text-[#39FF14] font-bold tracking-widest uppercase">Mins</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="font-tactical text-3xl md:text-7xl text-white">{String(timeLeft.seg).padStart(2,'0')}</span>
                                            <span className="text-[10px] md:text-xs text-[#39FF14] font-bold tracking-widest uppercase">Segs</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* DATOS CURIOSOS IMPACTANTES */}
                            <div className="w-full max-w-4xl mx-auto p-8 border-y-2 border-[#39FF14]/40 bg-black/70 backdrop-blur-md">
                                <div className="flex items-center justify-center gap-3 mb-4">
                                    <i data-lucide="zap" className="text-[#39FF14] w-5 h-5 animate-pulse"></i>
                                    <span className="text-[#39FF14] font-tactical tracking-[0.4em] text-xs uppercase font-bold italic">Flash Informativo</span>
                                </div>
                                <div key={currentFact} className="fact-display">
                                    <p className="font-oswald text-2xl md:text-5xl text-white leading-tight uppercase tracking-tight italic px-4">
                                        "{datosCuriosos[currentFact]}"
                                    </p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* PODCAST CENTER */}
                    <section className="py-24 px-4 max-w-7xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-4">
                            <div className="text-left">
                                <h2 className="text-5xl md:text-7xl font-oswald text-[#39FF14] leading-none mb-2">Podcast Center</h2>
                                <p className="text-gray-400 font-tactical uppercase tracking-widest text-xs italic border-l-2 border-[#39FF14] pl-4">Audios generados por NotebookLM</p>
                            </div>
                            <div className="bg-white/5 p-4 rounded border border-white/10 hidden md:block">
                                <i data-lucide="headphones" className="text-[#39FF14] w-8 h-8"></i>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {podcasts.map((p) => (
                                <div key={p.id} className="podcast-card p-8 rounded-2xl flex flex-col justify-between shadow-2xl">
                                    <div className="mb-6">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="bg-[#39FF14] text-black font-tactical text-[10px] px-3 py-1 rounded-sm uppercase tracking-widest font-bold italic">Episodio 0{p.id}</span>
                                            <i data-lucide="music" className="text-white/20 w-4 h-4"></i>
                                        </div>
                                        <h4 className="text-2xl font-oswald mt-2 mb-3 tracking-tight">{p.title}</h4>
                                        <p className="text-gray-500 text-xs leading-relaxed italic opacity-80">{p.desc}</p>
                                    </div>
                                    <div className="mt-4">
                                        <audio controls className="w-full h-10 rounded-full">
                                            <source src={p.file} type="audio/mpeg" />
                                            Tu navegador no soporta el reproductor de audio.
                                        </audio>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* MUSEO DE LA EVOLUCIÓN (CONTENIDO PDF INTEGRADO) */}
                    <section className="py-24 px-4 bg-white/5 border-y border-white/10 relative">
                        <div className="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none" style={{backgroundImage: 'radial-gradient(var(--neon-green) 0.5px, transparent 0.5px)', backgroundSize: '20px 20px'}}></div>
                        
                        <div className="max-w-7xl mx-auto relative z-10">
                            <h2 className="text-5xl md:text-6xl font-oswald mb-12 text-center text-[#39FF14] tracking-tighter">Museo de la Evolución</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-16">
                                <div className="p-8 bg-black/80 border border-white/10 rounded-xl space-y-6 shadow-xl">
                                    <div className="flex items-center gap-4 mb-2">
                                        <i data-lucide="file-text" className="text-[#39FF14] w-8 h-8"></i>
                                        <h4 className="text-3xl font-oswald text-[#39FF14]">La Caja de Zapatos (1938)</h4>
                                    </div>
                                    <p className="text-gray-400 leading-relaxed italic text-sm md:text-base">
                                        Durante la II Guerra Mundial, Ottorino Barassi salvó el trofeo Jules Rimet ocultándolo en una caja de zapatos bajo su cama para protegerlo de los nazis. El fútbol sobrevivió gracias a este acto de valentía.
                                    </p>
                                    <a href="Pasión_Mundial_De_1930_a_2026.pdf" target="_blank" className="btn-neon inline-flex items-center gap-2 px-6 py-3 rounded text-sm">
                                        <i data-lucide="download" className="w-4 h-4"></i> Leer Historia Completa
                                    </a>
                                </div>
                                <div className="p-8 bg-black/80 border border-white/10 rounded-xl space-y-6 shadow-xl">
                                    <div className="flex items-center gap-4 mb-2">
                                        <i data-lucide="activity" className="text-[#39FF14] w-8 h-8"></i>
                                        <h4 className="text-3xl font-oswald text-[#39FF14]">Balones: Del Cuero al 5G</h4>
                                    </div>
                                    <p className="text-gray-400 leading-relaxed italic text-sm md:text-base">
                                        En 1930 se usaron balones de tiento con cordones externos que herían a los jugadores. En 2026, el balón integrará sensores IMU 5G que envían datos constantes para una precisión absoluta.
                                    </p>
                                    <a href="World_Cup_Evolution.pdf" target="_blank" className="btn-neon inline-flex items-center gap-2 px-6 py-3 rounded text-sm">
                                        <i data-lucide="external-link" className="w-4 h-4"></i> Guía de Evolución PDF
                                    </a>
                                </div>
                            </div>

                            {/* Estadísticas Rápidas del Mundial */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                                <div className="p-8 glass flex flex-col items-center rounded-2xl border border-white/10">
                                    <i data-lucide="users" className="w-12 h-12 text-[#39FF14] mb-4"></i>
                                    <h5 className="font-oswald text-2xl mb-2">48 Naciones</h5>
                                    <p className="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">El mundial más grande de la historia</p>
                                </div>
                                <div className="p-8 glass flex flex-col items-center rounded-2xl border border-white/10">
                                    <i data-lucide="map-pin" className="w-12 h-12 text-[#39FF14] mb-4"></i>
                                    <h5 className="font-oswald text-2xl mb-2">16 Sedes</h5>
                                    <p className="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">3 países unidos por el fútbol</p>
                                </div>
                                <div className="p-8 glass flex flex-col items-center rounded-2xl border border-white/10">
                                    <i data-lucide="tv" className="w-12 h-12 text-[#39FF14] mb-4"></i>
                                    <h5 className="font-oswald text-2xl mb-2">Transmisión 8K</h5>
                                    <p className="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">Inmersión total en Fan Zones</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 px-4 text-center bg-black border-t border-white/5">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center opacity-60">
                            <div className="font-oswald text-4xl mb-6 md:mb-0">2026<span className="text-[#39FF14]">Mundial</span></div>
                            <div className="text-[10px] text-gray-600 uppercase tracking-[0.6em] font-bold">
                                Plataforma Informativa Independiente • Myth & Machine
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Re-initialize Lucide icons after render and on updates
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
