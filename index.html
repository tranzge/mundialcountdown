<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Mundial 2026 | Conteo Oficial y Guía de Tecnología ⚽</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KMZ4VQXY2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6KMZ4VQXY2');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --stadium-green: #00df82; 
            --pitch-dark: #01160d; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--pitch-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.15), transparent);
            background-attachment: fixed;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center; }

        /* HEADER */
        h1 { font-family: 'Barlow Condensed'; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; font-weight: 900; line-height: 0.9; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* COUNTDOWN JERÁRQUICO */
        .countdown-container { margin: 50px 0; }
        
        .days-hero { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 40px; 
            border-radius: 30px; 
            display: inline-block; 
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        .days-hero .num { font-size: 8rem; line-height: 1; color: var(--neon-blue); text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .days-hero .lab { font-size: 1.2rem; letter-spacing: 10px; color: var(--stadium-green); }

        .sub-units { display: flex; justify-content: center; gap: 15px; }
        .unit-small { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; min-width: 85px; }
        .unit-small .num { font-size: 2.5rem; color: #fff; }
        .unit-small .lab { font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; }

        .num { font-family: 'Barlow Condensed'; font-weight: 900; display: block; }

        /* MYTH BOX */
        .myth-box { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 30px; border-radius: 24px; margin: 40px 0; position: relative; text-align: left; }
        .myth-label { position: absolute; top: -12px; left: 20px; background: var(--pitch-dark); padding: 0 10px; font-size: 0.7rem; color: var(--neon-blue); border: 1px solid var(--neon-blue); border-radius: 5px; }

        /* SECCIÓN PDF */
        .pdf-card { background: linear-gradient(135deg, rgba(0, 223, 130, 0.15) 0%, rgba(0, 242, 255, 0.05) 100%); border: 1px solid var(--stadium-green); padding: 40px; border-radius: 30px; margin: 60px 0; }
        .btn-pdf { background: var(--stadium-green); color: var(--pitch-dark); padding: 20px 45px; border-radius: 50px; text-decoration: none; font-weight: 900; font-family: 'Barlow Condensed'; font-size: 1.4rem; display: inline-block; transition: 0.3s; }

        /* FAQS */
        .faq-section { text-align: left; margin-top: 80px; }
        .faq-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-bottom: 12px; overflow: hidden; }
        .faq-q { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: var(--neon-blue); }
        .faq-a { padding: 0 20px 20px; font-size: 0.95rem; opacity: 0.8; display: none; line-height: 1.6; color: #ccc; }

        .tools { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .btn-tool { background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 12px 30px; border-radius: 50px; cursor: pointer; text-decoration: none; font-weight: 700; }

        footer { margin-top: 100px; padding-bottom: 60px; opacity: 0.3; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MUNDIAL 2026</h1>
        <p style="letter-spacing: 5px; color: var(--stadium-green); font-weight: 900;">MÉXICO • USA • CANADÁ</p>
    </header>

    <div class="countdown-container">
        <div class="days-hero">
            <span class="num" id="d">000</span>
            <span class="lab">DÍAS</span>
        </div>
        <div class="sub-units">
            <div class="unit-small"><span class="num" id="h">00</span><span class="lab">HORAS</span></div>
            <div class="unit-small"><span class="num" id="m">00</span><span class="lab">MIN</span></div>
            <div class="unit-small"><span class="num" id="s">00</span><span class="lab">SEG</span></div>
        </div>
    </div>

    <div class="tools">
        <a href="calendario.html" class="btn-tool">📅 CALENDARIO</a>
    </div>

    <div class="myth-box">
        <div class="myth-label">THE MYTH & THE MACHINE</div>
        <p id="fact-text" style="font-size: 1.15rem; line-height: 1.6;">Cargando curiosidades...</p>
    </div>

    <div class="pdf-card">
        <h2 style="font-family:'Barlow Condensed'; font-size: 2.5rem; margin:0;">GUÍA HISTÓRICA & TECH</h2>
        <p style="margin: 20px 0;">Descarga el PDF sobre la evolución de 1930 a 2026.</p>
        <a href="The_Myth_and_The_Machine.pdf" class="btn-pdf" target="_blank">📥 DESCARGAR GUÍA</a>
    </div>

    <div class="faq-section">
        <h2 style="font-family:'Barlow Condensed'; font-size: 3rem; text-align: center; margin-bottom: 40px;">PREGUNTAS FRECUENTES (TRENDS)</h2>
        <div id="faq-list">
            </div>
    </div>

    <footer>WWW.CUENTAREGRESIVAMUNDIAL.COM | © 2026</footer>
</div>

<script src="datos_mundial.js"></script>
<script>
    const faqs = [
        ["¿Cómo registrarse para los boletos del Mundial 2026?", "Debes registrar tu interés en FIFA.com/tickets. La FIFA enviará notificaciones por correo sobre las fases de venta y sorteos aleatorios."],
        ["¿Cuál es el precio de las entradas?", "Se espera que las entradas de categoría más económica ronden los $70 - $100 USD para residentes, similar a ediciones anteriores."],
        ["¿Qué tecnología tendrá el balón oficial?", "Incluirá un sensor de 500Hz para detectar fueras de juego automáticos y proporcionar estadísticas de velocidad en tiempo real."],
        ["¿Cuántos partidos habrá en México?", "México tendrá 13 partidos: 5 en CDMX (Estadio Azteca), 4 en Monterrey (Estadio BBVA) y 4 en Guadalajara (Estadio Akron)."],
        ["¿Cómo es el nuevo formato de 48 equipos?", "Habrá 12 grupos de 4 selecciones. Clasifican los dos primeros y los 8 mejores terceros a dieciseisavos de final."],
        ["¿Habrá hologramas en los estadios?", "Sedes como Dallas planean proyecciones holográficas de jugadores en la cancha durante las ceremonias previas."],
        ["¿Es necesaria Visa para viajar entre las sedes?", "Para cruzar entre México, USA y Canadá se requieren los documentos legales vigentes (como la Visa Americana para mexicanos)."],
        ["¿Dónde será la Gran Final?", "El 19 de julio de 2026 en el MetLife Stadium de Nueva Jersey (área de Nueva York)."]
    ];

    function loadFaqs() {
        let html = '';
        faqs.forEach(f => {
            html += `<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">${f[0]} <span>+</span></div><div class="faq-a">${f[1]}</div></div>`;
        });
        document.getElementById('faq-list').innerHTML = html;
    }

    function toggleFaq(el) {
        const ans = el.nextElementSibling;
        ans.style.display = ans.style.display === 'block' ? 'none' : 'block';
    }

    function rotar() {
        if(typeof data !== 'undefined' && data.facts) {
            document.getElementById('fact-text').innerText = data.facts[Math.floor(Math.random()*data.facts.length)];
        }
    }

    const target = new Date("June 11, 2026 12:00:00").getTime();
    setInterval(() => {
        const d = target - new Date().getTime();
        document.getElementById('d').innerText = Math.floor(d / 86400000);
        document.getElementById('h').innerText = String(Math.floor((d % 86400000) / 3600000)).padStart(2,'0');
        document.getElementById('m').innerText = String(Math.floor((d % 3600000) / 60000)).padStart(2,'0');
        document.getElementById('s').innerText = String(Math.floor((d % 60000) / 1000)).padStart(2,'0');
    }, 1000);

    window.onload = () => { loadFaqs(); rotar(); setInterval(rotar, 6000); };
</script>
</body>
</html>
