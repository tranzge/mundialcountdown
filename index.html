<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Mundial 2026 | Conteo Oficial y Guía Tech ⚽</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KMZ4VQXY2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date()); gtag('config', 'G-6KMZ4VQXY2');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --green: #00df82; --dark: #01160d; --glass: rgba(255,255,255,0.05); }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; text-align: center; background-image: radial-gradient(circle at top, rgba(0,242,255,0.1), transparent); }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* CONTADOR JERÁRQUICO */
        .days-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; display: inline-block; width: 100%; max-width: 450px; margin: 30px 0 20px 0; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
        .days-box .num { font-size: 9rem; font-family: 'Barlow Condensed'; font-weight: 900; color: var(--blue); line-height: 1; display: block; }
        .days-box .lab { font-size: 1.2rem; letter-spacing: 12px; color: var(--green); font-weight: 900; }
        
        .sub-units { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .unit { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; min-width: 90px; }
        .unit .num { font-size: 2.5rem; font-family: 'Barlow Condensed'; font-weight: 900; display: block; }
        .unit .lab { font-size: 0.65rem; opacity: 0.6; letter-spacing: 2px; }

        .myth-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin: 40px 0; text-align: left; position: relative; }
        .myth-label { position: absolute; top: -12px; left: 20px; background: var(--dark); padding: 0 10px; font-size: 0.7rem; color: var(--blue); border: 1px solid var(--blue); border-radius: 5px; font-weight: 900; }
        
        .faq-section { text-align: left; margin-top: 60px; }
        .faq-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; margin-bottom: 12px; }
        .faq-q { padding: 20px; cursor: pointer; color: var(--blue); font-weight: 700; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .faq-a { padding: 20px; font-size: 0.95rem; opacity: 0.8; display: none; line-height: 1.6; color: #ccc; }

        .btn-pdf { background: var(--green); color: var(--dark); padding: 20px 45px; border-radius: 50px; text-decoration: none; font-weight: 900; font-family: 'Barlow Condensed'; display: inline-block; margin: 40px 0; font-size: 1.4rem; transition: 0.3s; }
        .btn-pdf:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--green); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-family:'Barlow Condensed'; font-size: 4rem; margin:0;">MUNDIAL 2026</h1>
    
    <div class="countdown">
        <div class="days-box">
            <span class="num" id="d">000</span>
            <span class="lab">DÍAS</span>
        </div>
        <div class="sub-units">
            <div class="unit"><span class="num" id="h">00</span><span class="lab">HORAS</span></div>
            <div class="unit"><span class="num" id="m">00</span><span class="lab">MIN</span></div>
            <div class="unit"><span class="num" id="s">00</span><span class="lab">SEG</span></div>
        </div>
    </div>

    <div class="myth-box">
        <div class="myth-label">SABÍAS QUE...</div>
        <p id="fact-text">Cargando datos históricos...</p>
    </div>

    <a href="The_Myth_and_The_Machine.pdf" class="btn-pdf" target="_blank">📥 DESCARGAR GUÍA PDF</a>

    <div class="faq-section">
        <h2 style="font-family:'Barlow Condensed'; font-size: 3rem; text-align: center; margin-bottom: 40px;">DUDAS FRECUENTES (TRENDS)</h2>
        <div id="faq-list"></div>
    </div>
</div>

<script src="datos_mundial.js"></script>
<script>
    // LÓGICA DE DATOS (CORREGIDA)
    function rotar() {
        if(typeof data !== 'undefined' && data.facts) {
            const txt = data.facts[Math.floor(Math.random() * data.facts.length)];
            const el = document.getElementById('fact-text');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = txt;
                el.style.opacity = 1;
            }, 500);
        }
    }

    // FAQs BASADAS EN TENDENCIAS DE GOOGLE
    const faqs = [
        ["¿Cómo registrarse para los boletos del Mundial 2026?", "Debes registrar tu interés en FIFA.com/tickets. La FIFA enviará notificaciones por correo sobre las fases de venta y sorteos aleatorios."],
        ["¿Cuál es el precio de las entradas?", "Se espera que las entradas de categoría más económica ronden los $70 - $100 USD para residentes, similar a ediciones anteriores."],
        ["¿Qué tecnología tendrá el balón oficial?", "Incluirá un sensor de 500Hz para detectar fueras de juego automáticos y proporcionar estadísticas de velocidad en tiempo real."],
        ["¿Cuántos partidos habrá en México?", "México tendrá 13 partidos: 5 en CDMX (Estadio Azteca), 4 en Monterrey (Estadio BBVA) y 4 en Guadalajara (Estadio Akron)."],
        ["¿Cómo es el nuevo formato de 48 equipos?", "Habrá 12 grupos de 4 selecciones. Clasifican los dos primeros y los 8 mejores terceros a dieciseisavos de final."],
        ["¿Habrá hologramas en los estadios?", "Sedes como Dallas planean proyecciones holográficas de jugadores en la cancha durante las ceremonias previas."],
        ["¿Es necesaria Visa para viajar entre las sedes?", "Para cruzar entre México, USA y Canadá se requieren los documentos legales vigentes (como la Visa Americana para mexicanos)."],
        ["¿Dónde será la Gran Final?", "El 19 de julio de 2026 en el MetLife Stadium de Nueva Jersey (área de Nueva York)."]
    ];
    
    document.getElementById('faq-list').innerHTML = faqs.map(f => `
        <div class="faq-item">
            <div class="faq-q" onclick="const a=this.nextElementSibling; a.style.display=a.style.display==='block'?'none':'block'">${f[0]} <span>+</span></div>
            <div class="faq-a">${f[1]}</div>
        </div>
    `).join('');

    // RELOJ
    const target = new Date("June 11, 2026 12:00:00").getTime();
    setInterval(() => {
        const d = target - new Date().getTime();
        document.getElementById('d').innerText = Math.floor(d / 86400000);
        document.getElementById('h').innerText = String(Math.floor((d % 86400000) / 3600000)).padStart(2,'0');
        document.getElementById('m').innerText = String(Math.floor((d % 3600000) / 60000)).padStart(2,'0');
        document.getElementById('s').innerText = String(Math.floor((d % 60000) / 1000)).padStart(2,'0');
    }, 1000);

    window.onload = () => { rotar(); setInterval(rotar, 12000); };
</script>
</body>
</html>
