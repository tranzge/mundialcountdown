<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Event",
    "name": "Countdown Mundial FIFA 2026",
    "startDate": "2026-06-11T19:00:00Z",
    "location": { "@type": "Place", "name": "Estadio Azteca, México", "address": "CDMX" },
    "description": "Cuenta regresiva oficial y datos épicos del Mundial 2026."
  }
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6KMZ4VQXY2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6KMZ4VQXY2');
  </script>
  
  <title>🏆 Mundial 2026 | Countdown & Mega Datos</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #030712;
      --accent: #00f2ff;
      --accent-glow: rgba(0, 242, 255, 0.3);
      --card: rgba(15, 23, 42, 0.8);
    }

    body {
      margin: 0; font-family: 'Inter', sans-serif; background: var(--bg);
      color: white; overflow-x: hidden; min-height: 100vh;
    }

    /* LUCES DE ESTADIO DINÁMICAS */
    .stadium-lights { position: fixed; inset: 0; background: radial-gradient(circle at 50% -20%, #1e293b, var(--bg)); z-index: -1; }
    .light-beam {
      position: absolute; top: -100px; width: 300px; height: 1000px;
      background: conic-gradient(from 180deg at 50% 0%, var(--accent-glow), transparent);
      filter: blur(80px); opacity: 0.2; transform-origin: top;
      animation: swing 10s ease-in-out infinite;
    }
    .beam-1 { left: 10%; }
    .beam-2 { right: 10%; animation-delay: -5s; }
    @keyframes swing { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }

    /* PARTÍCULAS DE ENERO */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .dot { position: absolute; background: var(--accent); border-radius: 50%; opacity: 0.4; animation: up 5s linear infinite; }
    @keyframes up { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }

    .lang-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .l-btn { 
      background: none; border: 1px solid var(--accent); color: var(--accent);
      padding: 6px 15px; border-radius: 20px; cursor: pointer; font-family: 'Oswald';
      font-size: 0.8rem;
    }
    .l-btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }

    .poster {
      background: var(--card); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px; padding: 60px 20px; text-align: center;
      backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    .days-big {
      font-family: 'Oswald'; font-size: clamp(100px, 25vw, 200px);
      line-height: 0.8; margin: 10px 0; color: #fff;
      text-shadow: 0 0 40px var(--accent-glow);
    }

    /* CAJA DE DATOS INTERACTIVA */
    .fact-card {
      background: rgba(0,0,0,0.5); border: 1px solid var(--accent);
      border-radius: 20px; padding: 25px; margin: 30px auto;
      max-width: 600px; cursor: pointer; position: relative; transition: 0.3s;
    }
    .fact-card:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--accent-glow); }
    .tap-hint {
      position: absolute; top: -12px; right: 20px; background: var(--accent);
      color: black; font-size: 0.6rem; font-weight: 900; padding: 4px 10px; border-radius: 10px;
    }

    .btn-main {
      background: var(--accent); color: black; border: none; padding: 20px 50px;
      border-radius: 50px; font-family: 'Oswald'; font-size: 1.3rem; font-weight: 700;
      cursor: pointer; text-transform: uppercase; width: 100%; max-width: 400px;
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 50px; }
    .group-box { background: rgba(255,255,255,0.03); border-radius: 25px; padding: 25px; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
    .group-box h3 { font-family: 'Oswald'; color: var(--accent); margin: 0 0 15px 0; font-size: 1.5rem; }
    .team { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 0.95rem; }
  </style>
</head>
<body>

<div class="stadium-lights">
  <div class="light-beam beam-1"></div>
  <div class="light-beam beam-2"></div>
</div>
<div class="particles" id="particles"></div>

<div class="wrap">
  <div class="lang-switcher">
    <button class="l-btn active" id="btn-es" onclick="changeLang('es')">ESP 🇲🇽</button>
    <button class="l-btn" id="btn-en" onclick="changeLang('en')">ENG 🇺🇸</button>
  </div>

  <section class="poster">
    <h1 id="t-title" style="font-family:'Oswald'; color:var(--accent); letter-spacing:5px; margin:0; font-size:1.2rem;">COUNTDOWN WORLD CUP 2026</h1>
    <div class="days-big" id="days">--</div>
    <div id="t-sub" style="font-family:'Oswald'; font-size:2rem; letter-spacing:2px; margin-bottom: 30px;">DÍAS PARA LA GLORIA</div>

    <div class="fact-card" onclick="nextFact()">
      <div class="tap-hint" id="t-hint">TOCA PARA CAMBIAR</div>
      <strong id="t-did" style="font-family:'Oswald'; color:var(--accent); letter-spacing:2px; display:block; margin-bottom:10px;">🔥 ¿SABÍAS ESTO?</strong>
      <span id="fact-text" style="font-size:1.1rem; line-height:1.5; color:#cbd5e1;">Cargando secreto mundialista...</span>
    </div>

    <button class="btn-main" id="t-btn" onclick="window.location.href='calendario.html'">VER CALENDARIO OFICIAL</button>
  </section>

  <div class="grid" id="groups-ui"></div>
</div>

<script>
  let lang = 'es';
  const target = new Date(Date.UTC(2026, 5, 11, 19, 0, 0));

  const content = {
    es: {
      title: "MUNDIAL 2026 COUNTDOWN", sub: "DÍAS PARA LA GLORIA", hint: "TOCA PARA CAMBIAR", did: "🔥 ¿SABÍAS ESTO?", btn: "VER CALENDARIO OFICIAL",
      facts: [
        "¡México histórico! Será el único país con 3 Mundiales (1970, 1986, 2026).",
        "El Estadio Azteca tendrá su tercera inauguración oficial, récord absoluto.",
        "Habrá 104 partidos y 48 selecciones. ¡Fútbol total por casi 40 días!",
        "La Final será en el MetLife Stadium de Nueva Jersey ante 82,500 personas.",
        "El trofeo Jules Rimet fue encontrado por un perro llamado Pickles en 1966.",
        "En 1954 se anotaron 140 goles en 26 partidos. ¡Un promedio de 5.4 por juego!",
        "¿Mundial descalzo? En 1950, India se retiró porque no les dejaron jugar sin zapatos.",
        "El gol más rápido fue de Hakan Sükür: ¡11 segundos de juego en 2002!",
        "El Estadio Arrowhead (Sede 2026) tiene el récord de ruido: ¡142 decibelios!",
        "Pelé es el único jugador en ganar 3 veces la Copa del Mundo.",
        "El Mundial 2026 será el primero organizado por tres países simultáneamente.",
        "Zinedine Zidane y Cafú son los jugadores con más tarjetas en la historia (6).",
        "La mayor goleada fue el 10-1 de Hungría a El Salvador en 1982.",
        "Just Fontaine tiene el récord de más goles en un solo mundial: 13 goles en 1958.",
        "Robert Lewandowski anotó el gol 2600 en la historia de los mundiales.",
        "El mundial de 2026 durará 39 días, 7 días más que el formato anterior.",
        "Monterrey y Guadalajara tendrán 4 partidos cada uno en este mundial.",
        "FIFA espera recaudar más de 11 mil millones de dólares con el torneo 2026.",
        "Miroslav Klose es el máximo goleador histórico con 16 anotaciones.",
        "El trofeo actual pesa 6.1 kilos y es de oro sólido de 18 quilates.",
        "Islandia es el país más pequeño (por población) en calificar a un mundial.",
        "Brasil ha participado en todas las ediciones de la Copa del Mundo.",
        "El Estadio MetLife cambiará su césped artificial por natural para la final de 2026.",
        "En 2026, los equipos estarán divididos en 12 grupos de 4 selecciones.",
        "Cristiano Ronaldo es el único jugador en anotar en 5 mundiales distintos."
      ]
    },
    en: {
      title: "WORLD CUP 2026 COUNTDOWN", sub: "DAYS UNTIL GLORY", hint: "TAP TO CHANGE", did: "🔥 DID YOU KNOW?", btn: "VIEW OFFICIAL SCHEDULE",
      facts: [
        "History in Mexico! First country to host 3 World Cups (1970, 1986, 2026).",
        "Azteca Stadium hosts its 3rd opening match, a record for decades.",
        "Biggest World Cup ever: 104 matches and 48 teams. Pure football!",
        "The Grand Final will be at MetLife Stadium in New Jersey (82,500 capacity).",
        "A dog named Pickles found the stolen World Cup trophy in 1966.",
        "In 1954, 140 goals were scored in 26 games. An average of 5.4 per match!",
        "Barefoot football? India withdrew in 1950 because boots were mandatory.",
        "Fastest goal: Hakan Sükür scored in just 11 seconds (2002).",
        "Arrowhead Stadium (2026 Venue) holds the record for loudest stadium: 142dB!",
        "Pelé is the only player to win 3 World Cups.",
        "2026 will be the first World Cup hosted by three nations.",
        "Zidane and Cafu hold the record for most cards in WC history (6).",
        "Biggest win: Hungary 10-1 El Salvador in 1982.",
        "Just Fontaine holds the record for most goals in one WC: 13 (1958).",
        "Robert Lewandowski scored the 2600th goal in WC history.",
        "The 2026 tournament will last 39 days, one week longer than before.",
        "Monterrey and Guadalajara will host 4 matches each in 2026.",
        "FIFA expects to earn $11 billion from the 2026 tournament.",
        "Miroslav Klose is the top scorer of all time with 16 goals.",
        "The current trophy weighs 6.1 kg and is made of solid 18-carat gold.",
        "Iceland is the smallest nation to ever qualify for a World Cup.",
        "Brazil has played in every single World Cup tournament.",
        "MetLife Stadium will replace its turf with natural grass for the 2026 final.",
        "In 2026, teams will be divided into 12 groups of 4 selections.",
        "Cristiano Ronaldo is the only player to score in 5 different World Cups."
      ]
    }
  };

  function changeLang(l) {
    lang = l;
    document.getElementById('btn-es').classList.toggle('active', l === 'es');
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    updateUI();
  }

  function updateUI() {
    const c = content[lang];
    document.getElementById('t-title').innerText = c.title;
    document.getElementById('t-sub').innerText = c.sub;
    document.getElementById('t-hint').innerText = c.hint;
    document.getElementById('t-did').innerText = c.did;
    document.getElementById('t-btn').innerText = c.btn;
    nextFact();
  }

  function nextFact() {
    const f = content[lang].facts;
    const textEl = document.getElementById('fact-text');
    textEl.style.opacity = 0;
    setTimeout(() => {
      textEl.innerText = f[Math.floor(Math.random()*f.length)];
      textEl.style.opacity = 1;
      gtag('event', 'fact_click', { 'language': lang });
    }, 200);
  }

  function startTimer() {
    const diff = target - new Date();
    document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000));
  }

  const groupsData = [
    {n:"A", f:"🇲🇽", t:["México","Corea del Sur","Sudáfrica","Repechaje UEFA"]},
    {n:"B", f:"🇨🇦", t:["Canadá","Suiza","Qatar","Repechaje UEFA"]},
    {n:"C", f:"🇧🇷", t:["Brasil","Marruecos","Haití","Escocia"]},
    {n:"D", f:"🇺🇸", t:["USA","Paraguay","Australia","Repechaje UEFA"]},
    {n:"E", f:"🇩🇪", t:["Alemania","Curazao","Costa de Marfil","Ecuador"]},
    {n:"F", f:"🇳🇱", t:["P. Bajos","Japón","Repechaje UEFA","Túnez"]},
    {n:"G", f:"🇧🇪", t:["Bélgica","Egipto","Irán","N. Zelanda"]},
    {n:"H", f:"🇪🇸", t:["España","Cabo Verde","Arabia Sau.","Uruguay"]},
    {n:"I", f:"🇫🇷", t:["Francia","Senegal","Rep. Cont.","Noruega"]},
    {n:"J", f:"🇦🇷", t:["Argentina","Argelia","Austria","Jordania"]},
    {n:"K", f:"🇵🇹", t:["Portugal","Rep. Cont.","Uzbekistán","Colombia"]},
    {n:"L", f:"🏴󠁧󠁢󠁥󠁮ッグ󠁿", t:["Inglaterra","Croacia","Ghana","Panamá"]}
  ];

  const grid = document.getElementById('groups-ui');
  groupsData.forEach(g => {
    let h = `<div class="group-box"><h3>GRUPO ${g.n} ${g.f}</h3>`;
    g.t.forEach(team => h += `<div class="team"><span>${team}</span><span style="color:var(--accent)">›</span></div>`);
    grid.innerHTML += h + `</div>`;
  });

  function createParticles() {
    const pContainer = document.getElementById('particles');
    for(let i=0; i<40; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const size = Math.random() * 4 + 1;
      dot.style.width = size + 'px'; dot.style.height = size + 'px';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.animationDuration = (Math.random() * 3 + 3) + 's';
      dot.style.animationDelay = Math.random() * 5 + 's';
      pContainer.appendChild(dot);
    }
  }

  createParticles(); setInterval(startTimer, 1000); startTimer(); updateUI();
</script>
</body>
</html>
